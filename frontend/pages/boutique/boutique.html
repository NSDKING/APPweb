<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Boutique – ShoeBox</title>

    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="../../assets/css/shop.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <style>
      /* fav button — guaranteed override */
      .product-card__img-wrapper {
        overflow: visible !important;
        position: relative;
      }
      .product-card__img {
        border-radius: 16px;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .product-card__fav {
        position: absolute !important;
        top: 10px !important;
        right: 10px !important;
        width: 36px !important;
        height: 36px !important;
        background: #fff !important;
        border: none !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        box-shadow: 0 2px 10px rgba(0,0,0,.25) !important;
        color: #9ca3af !important;
        cursor: pointer !important;
        z-index: 50 !important;
        padding: 0 !important;
      }
      .product-card__fav:hover  { color: #c91310 !important; transform: scale(1.12); }
      .product-card__fav--active { color: #c91310 !important; }
      .product-card__fav--active svg { fill: #c91310 !important; }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar">
        <img src="../../assets/img/logo_ShoeBox.png" width="100" height="100">
        <ul id="nav-links" class="navbar__links">
            <li class="navbar__item"><a class="navbar__link" href="/">Accueil</a></li>
            <li class="navbar__item"><a class="navbar__link" href="/pages/boutique/boutique.html">Boutique</a></li>
            <li class="navbar__item"><a class="navbar__link"
                    href="/pages/boutique/boutique.html?category=new">Nouveauté</a></li>
            <li class="navbar__item"><a class="navbar__link"
                    href="/pages/boutique/boutique.html?category=promo">Promotions</a></li>
        </ul>
        <div id="nav-actions" class="navbar__actions">
            <button id="search-btn" class="navbar__icon-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </button>
            <a href="/pages/shop/favourites.html" class="navbar__icon-btn navbar__icon-btn--fav" aria-label="Favoris">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span class="navbar__fav-count"></span>
            </a>
            <a href="/pages/shop/cart.html" id="cart-btn" class="navbar__icon-btn navbar__icon-btn--cart"
                aria-label="Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 01-8 0" />
                </svg>
                <span id="cart-count" class="navbar__cart-count">0</span>
            </a>
        </div>
    </nav>

    <main>
        <div class="main-top">
            <h1 class="page-title">Toutes les sneakers</h1>
            <p id="product-count"></p>
        </div>

        <div class="shop-layout">
            <!-- Sidebar Filters -->
            <aside class="shop-filters" id="filters-sidebar">
                <div class="filters-header">
                    <h2 class="filters-title">Filtres</h2>
                    <button id="filters-reset" class="filters-reset">Réinitialiser</button>
                </div>

                <!-- Brand -->
                <div class="filter-group">
                    <h3 class="filter-group__title">Marque</h3>
                    <div class="filter-group__options" id="brand-options">
                        <label class="filter-option">
                            <input type="radio" name="brand" value="all" checked /> Toutes les marques
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="brand" value="nike" /> Nike
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="brand" value="adidas" /> Adidas
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="brand" value="jordan" /> Jordan
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="brand" value="new balance" /> New Balance
                        </label>
                    </div>
                </div>

                <!-- Price -->
                <div class="filter-group">
                    <h3 class="filter-group__title">Prix</h3>
                    <div class="filter-group__options" id="price-options">
                        <label class="filter-option">
                            <input type="radio" name="price" value="all" checked /> Tous les prix
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="price" value="under100" /> Moins de 100€
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="price" value="100to150" /> 100€ – 150€
                        </label>
                        <label class="filter-option">
                            <input type="radio" name="price" value="over150" /> Plus de 150€
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Products -->
            <div class="shop-content">
                <!-- Mobile filter toggle -->
                <button id="filter-toggle" class="filter-toggle">Afficher les filtres</button>

                <div id="products-grid" class="products-grid"></div>

                <div id="no-results" class="no-results" style="display:none;">
                    Aucun produit ne correspond à vos critères.
                </div>
            </div>
        </div>
    </main>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/search.js"></script>
    <script src="../../assets/js/favourites.js"></script>
    <script src="../../assets/js/boutique.js"></script>
</body>

</html>
