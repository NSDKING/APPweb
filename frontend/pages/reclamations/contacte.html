<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - ShoeBox</title>
  <link rel="stylesheet" href="/assets/css/contacte.css">
</head>
<body>

  <header>

    <div class="logo">SHOES STORE</div>

    <nav>
      <a href="#">Accueil</a>
      <a href="#">Boutique</a>
      <a href="#">Recherche</a>
    </nav>

  </header>

  <section class="contact-section">

    <!-- INFOS -->

    <div class="contact-info">

      <h1>Contactez-nous</h1>

      <p>
        Une question sur une commande, un produit ou une livraison ?
        Notre équipe est disponible pour vous répondre rapidement.
      </p>

      <div class="info-box">


        <div class="info-item">
          <h3>Téléphone</h3>
          <p>+33 01 02 03 04 10</p>
        </div>

        <div class="info-item">
          <h3>Email</h3>
          <p>contact@shoeBox.fr</p>
        </div>

      </div>

    </div>

    <!-- FORMULAIRE -->

    <div class="contact-form">

      <h2>Envoyer un message</h2>

      <form>

        <div class="input-group">
          <input type="text" placeholder="Votre nom">
        </div>

        <div class="input-group">
          <input type="email" placeholder="Votre email">
        </div>

        <div class="input-group">
          <input type="text" placeholder="Sujet">
        </div>

        <div class="input-group">
          <textarea placeholder="Votre message"></textarea>
        </div>

        <button type="submit">Envoyer</button>

      </form>

    </div>

  </section>

  <footer>
    ShoeBox 
  </footer>

</body>
</html>
