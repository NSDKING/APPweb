<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Favoris — ShoeBox</title>
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <link rel="stylesheet" href="../../assets/css/layout.css" />
  <link rel="stylesheet" href="../../assets/css/components.css" />
</head>
<body>

  <nav id="navbar" class="navbar">
    <a href="/"><img src="../../assets/img/logo_shoebox.png" width="100" height="100" alt="ShoeBox"></a>
    <ul id="nav-links" class="navbar__links">
      <li class="navbar__item"><a class="navbar__link" href="/">Accueil</a></li>
      <li class="navbar__item"><a class="navbar__link" href="/pages/boutique/boutique.html">Boutique</a></li>
      <li class="navbar__item"><a class="navbar__link" href="/pages/boutique/boutique.html?category=new">Nouveauté</a></li>
      <li class="navbar__item"><a class="navbar__link" href="/pages/boutique/boutique.html?category=promo">Promotions</a></li>
      <li class="navbar__item"><a class="navbar__link" href="/pages/account/profile.html">Compte</a></li>
    </ul>
    <div id="nav-actions" class="navbar__actions">
      <button id="search-btn" class="navbar__icon-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <a href="/pages/shop/favourites.html" class="navbar__icon-btn navbar__icon-btn--fav" aria-label="Favoris">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="navbar__fav-count"></span>
      </a>
      <a href="/pages/shop/cart.html" id="cart-btn" class="navbar__icon-btn navbar__icon-btn--cart" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span id="cart-count" class="navbar__cart-count">0</span>
      </a>
    </div>
  </nav>

  <main class="featured" style="min-height:60vh;">
    <div class="featured__header">
      <div>
        <h2 class="featured__heading">Mes Favoris</h2>
        <p class="featured__subheading" id="fav-subtitle">Chargement...</p>
      </div>
      <a href="/pages/boutique/boutique.html" class="featured__see-all">
        Voir la boutique
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>

    <div id="fav-empty" style="display:none; text-align:center; padding:4rem 1rem; color:#71717a;">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="color:#d4d4d8; margin-bottom:1rem;">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <p style="font-size:1.1rem; font-weight:600; color:#18181b; margin-bottom:.5rem;">Aucun favori pour l'instant</p>
      <p style="margin-bottom:2rem;">Cliquez sur le <span style="color:#c91310;">&#9829;</span> sur un produit pour l'ajouter.</p>
      <a href="/pages/boutique/boutique.html" style="display:inline-flex;align-items:center;gap:.5rem;background:#c91310;color:#fff;padding:.75rem 2rem;border-radius:12px;font-weight:700;text-decoration:none;">
        Découvrir la boutique
      </a>
    </div>

    <div id="fav-grid" class="featured__grid"></div>
  </main>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/search.js"></script>
  <script src="../../assets/js/favourites.js"></script>
  <script>
    const favGrid    = document.getElementById('fav-grid');
    const favEmpty   = document.getElementById('fav-empty');
    const favSubtitle = document.getElementById('fav-subtitle');

    async function renderFavourites() {
      const res = await apiFetch('/favourites');
      const favs = (res.success && res.data) ? res.data : [];

      favSubtitle.textContent = favs.length + ' article' + (favs.length !== 1 ? 's' : '');

      if (!favs.length) {
        favGrid.innerHTML = '';
        favEmpty.style.display = 'block';
        return;
      }
      favEmpty.style.display = 'none';

      favGrid.innerHTML = favs.map(p => {
        const price = parseFloat(p.price);
        const sale  = p.sale_price ? parseFloat(p.sale_price) : null;
        return `
          <a href="/pages/shop/product.html?id=${p.id}" class="product-card">
            <button class="product-card__fav product-card__fav--active" data-id="${p.id}" aria-label="Retirer des favoris">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
            <div class="product-card__img-wrapper">
              ${sale ? '<span class="product-card__badge">Promo</span>' : ''}
              <img src="${p.img_url || 'https://via.placeholder.com/600x400'}" alt="${p.name}" class="product-card__img" />
            </div>
            <p class="product-card__brand">${p.brand}</p>
            <h3 class="product-card__name">${p.name}</h3>
            <div class="product-card__pricing">
              <span class="product-card__price">${sale ?? price}€</span>
              ${sale ? `<span class="product-card__original">${price}€</span>` : ''}
            </div>
          </a>
        `;
      }).join('');
    }

    renderFavourites();

    favGrid.addEventListener('click', async e => {
      const btn = e.target.closest('.product-card__fav');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      await toggleFavouriteApi(btn.dataset.id);
      renderFavourites();
    });
  </script>
</body>
</html>
